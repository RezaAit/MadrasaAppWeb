<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8">
  <base href="/teacher/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <title>মাদরাসাতুল হুদা আল-ইসলামিয়া — শিক্ষক পোর্টাল</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Quill Rich Text Editor (CDN, local copy recommended for production) -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/shared/css/common.css">
  <link rel="stylesheet" href="/teacher/css/style.css">
  <link rel="manifest" href="/teacher/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="হুদা শিক্ষক">
  <link rel="apple-touch-icon" href="/images/logo.png">
</head>
<body>
<div class="app-shell">

  <!-- ═══════════════════════════════════════════════════════ LOGIN SCREEN -->
  <div id="screen-login" class="screen active">
    <div class="ls-root">

      <!-- hero area -->
      <div class="ls-hero">
        <div class="ls-bubble ls-b1"></div>
        <div class="ls-bubble ls-b2"></div>
        <div class="ls-bubble ls-b3"></div>
        <div class="ls-bubble ls-b4"></div>
        <div class="ls-logo-wrap">
          <img src="../images/logo.png" alt="logo" width="64" height="64">
        </div>
        <h1 class="ls-hero-name">মাদরাসাতুল হুদা আল-ইসলামিয়া আস-সালাফিয়া</h1>
        <p class="ls-hero-sub">Teacher Portal · শিক্ষক পোর্টাল</p>
      </div>

      <!-- wave + card -->
      <div class="ls-card-wrap">
        <div class="ls-wave">
          <svg viewBox="0 0 480 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,56 L0,18 C80,48 160,4 240,22 C320,40 400,8 480,20 L480,56 Z" fill="#ffffff"/>
          </svg>
        </div>
        <div class="ls-card-body">
          <div class="ls-card">

            <!-- Step 1: Phone -->
            <div id="phone-step" class="ls-step">
              <p class="ls-card-title">লগইন করুন</p>
              <p class="ls-card-sub">রেজিস্টার্ড মোবাইল নম্বর দিন</p>
              <div class="lss-phone-row">
                <div class="lss-flag">+880</div>
                <input type="tel" id="phone-input" inputmode="numeric" placeholder="1XXXXXXXXX" maxlength="10" class="lss-phone-input">
              </div>
              <button class="lss-btn" id="send-otp-btn" disabled>
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                OTP পাঠান
              </button>
              <p class="lss-sent-msg" id="otp-sent-msg">✓ OTP পাঠানো হয়েছে</p>
            </div>

            <!-- Step 2: OTP -->
            <div id="otp-step" class="ls-step" style="display:none;">
              <div class="lss-otp-header">
                <p class="ls-card-title">যাচাই কোড (OTP)</p>
                <button id="change-number" class="lss-change">
                  <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                  পরিবর্তন
                </button>
              </div>
              <p class="ls-card-sub"><span id="display-number" class="lss-otp-num"></span> নম্বরে পাঠানো ৬ সংখ্যার কোড</p>
              <div class="otp-input-row">
                <input type="tel" class="otp-box" inputmode="numeric" maxlength="1">
                <input type="tel" class="otp-box" inputmode="numeric" maxlength="1">
                <input type="tel" class="otp-box" inputmode="numeric" maxlength="1">
                <input type="tel" class="otp-box" inputmode="numeric" maxlength="1">
                <input type="tel" class="otp-box" inputmode="numeric" maxlength="1">
                <input type="tel" class="otp-box" inputmode="numeric" maxlength="1">
              </div>
              <button class="lss-btn" id="verify-otp-btn">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                লগইন করুন
              </button>
              <p class="lss-hint" id="otp-resend-hint">SMS না আসলে কিছুক্ষণ অপেক্ষা করুন</p>
            </div>

            <!-- footer -->
            <div class="lss-footer">
              <span>Powered by</span>
              <strong>HELIX</strong>
              <span class="lss-dot"></span>
              <span>sbook.com.bd</span>
            </div>

          </div><!-- /.ls-card -->
        </div><!-- /.ls-card-body -->
      </div><!-- /.ls-card-wrap -->
      <div class="ls-white-space"></div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════ MAIN APP SHELL -->
  <div id="screen-main" class="screen" style="min-height:100vh;">
    <!-- Teacher profile bar -->
    <div class="teacher-header-bar">
      <!-- Decorative bubbles -->
      <div class="thb-bubble thb-b1"></div>
      <div class="thb-bubble thb-b2"></div>
      <div class="thb-bubble thb-b3"></div>
      <div class="thb-bubble thb-b4"></div>

      <!-- Content -->
      <div class="thb-content">
        <div class="teacher-avatar" id="teacher-initials">শি</div>
        <div class="teacher-info">
          <h2 id="teacher-fullname">শিক্ষক</h2>
          <p id="teacher-designation">—</p>
        </div>
        <div class="thb-menu-wrap">
          <button id="thb-three-dot" class="thb-three-dot" title="মেনু">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
          </button>
          <div class="thb-dropdown" id="thb-dropdown">
            <button class="thb-dd-item" id="teacher-refresh-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              রিফ্রেশ
            </button>
            <button class="thb-dd-item danger" id="teacher-logout-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              লগআউট
            </button>
          </div>
        </div>
        <!-- legacy hidden buttons for JS compat -->
        <button id="teacher-logout-btn-hidden" style="display:none;"></button>
      </div>

    </div>

    <!-- Navigation -->
    <nav class="main-nav" id="main-nav">
      <!-- populated by JS -->
    </nav>

    <!-- Wave separator below nav -->
    <div class="thb-wave-sep">
      <svg viewBox="0 0 480 32" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 C80,32 160,32 240,16 C320,0 400,32 480,16 L480,32 L0,32 Z" fill="#ffffff"/>
      </svg>
    </div>

    <!-- Dynamic content -->
    <div id="main-content" class="scroll-content stagger-in" style="flex:1;">
      <div class="p-16">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
  </div>

</div><!-- .app-shell -->

<!-- Quill JS -->
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>

<script>
  // Phone input: digits only, max 10, button enables at exactly 10 digits
  document.addEventListener('DOMContentLoaded', function () {
    var inp = document.getElementById('phone-input');
    var btn = document.getElementById('send-otp-btn');
    if (!inp) return;
    inp.addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 10);
      btn.disabled = this.value.length !== 10;
    });
  });
</script>
<script type="module">
  import { init } from './js/dashboard.js';
  document.addEventListener('DOMContentLoaded', init);
</script>
<script>
  // Lazy image fade-in
  document.addEventListener('DOMContentLoaded', () => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('loaded'); obs.unobserve(e.target); } });
    });
    document.querySelectorAll('img[loading="lazy"]').forEach(img => {
      if (img.complete) img.classList.add('loaded'); else obs.observe(img);
    });
    // Re-observe dynamically added images
    new MutationObserver(muts => {
      muts.forEach(m => m.addedNodes.forEach(n => {
        if (n.nodeType !== 1) return;
        (n.matches?.('img[loading="lazy"]') ? [n] : [...n.querySelectorAll?.('img[loading="lazy"]') || []]).forEach(img => {
          if (img.complete) img.classList.add('loaded'); else obs.observe(img);
        });
      }));
    }).observe(document.body, { childList: true, subtree: true });
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/teacher/sw.js', { scope: '/teacher/' });
  }
  let _deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredPrompt = e;
    setTimeout(() => {
      if (_deferredPrompt) {
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(() => { _deferredPrompt = null; });
      }
    }, 3000);
  });
</script>
</body>
</html>
